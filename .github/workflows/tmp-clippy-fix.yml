name: Temporary Clippy Fix

on:
  push:
    branches:
      - cursor/schemaforge-hybrid-compiler-98d8

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: cursor/schemaforge-hybrid-compiler-98d8
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Apply targeted lint fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/schemaforge-ir/src/lib.rs')
          text = path.read_text()
          old = 'self.object.required.iter().any(|required| required == name)'
          new = 'self.object.required.contains(name)'
          if old not in text:
              raise SystemExit('target expression not found')
          path.write_text(text.replace(old, new))
          PY
          cargo fmt --all
      - name: Verify Clippy and capture any remaining error
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy-error.log
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.clippy.outcome }}" = "success" ]; then
            rm -f clippy-error.log
            git rm .github/workflows/tmp-clippy-fix.yml
            git add -- '*.rs'
            git commit -m "fix: satisfy clippy for object introspection"
          else
            git add crates/schemaforge-ir/src/lib.rs clippy-error.log
            git commit -m "chore: capture remaining clippy error"
          fi
          git push origin HEAD:cursor/schemaforge-hybrid-compiler-98d8
