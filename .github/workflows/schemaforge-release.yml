# Draft release workflow — triggered manually.
#
# This workflow documents the intended release steps for SchemaForge.
# It runs `make test` to confirm the workspace is green, then prints
# guidance for the remaining manual steps (SBOM, attestations, publishing).
#
# TODO (before enabling for production):
#   - Add cargo-publish jobs for each workspace member crate (in dep order).
#   - Add maturin build + upload for the Python wheel.
#   - Add napi build + npm publish for the Node package.
#   - Integrate cargo-cyclonedx SBOM generation and upload to GitHub Release.
#   - Add SLSA provenance generation via slsa-github-generator.
#   - Store the sfg binary SHA-256 digest in the release notes.

name: schemaforge-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run — skip publish steps"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  # ── Gate: full test suite must pass ────────────────────────────────────────
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run workspace tests
        run: make test

  # ── Lint gate ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (pedantic)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── SBOM generation ────────────────────────────────────────────────────────
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write # needed to upload to GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate Rust SBOM
        run: cargo cyclonedx --format json --output-file sbom-rust.cdx.json

      - name: Upload Rust SBOM artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-rust
          path: sbom-rust.cdx.json
          if-no-files-found: error

      # NOTE: Python and Node SBOM steps are stubs until the FFI crates are
      # fully enabled (see docs/sbom.md §2.2 and §2.3).

  # ── Record compiler manifest digest ───────────────────────────────────────
  record-manifest-digest:
    name: Record manifest digest
    runs-on: ubuntu-latest
    needs: generate-sbom
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p schemaforge-cli

      - name: Record sfg SHA-256
        run: |
          echo "## sfg binary digest" >> "$GITHUB_STEP_SUMMARY"
          sha256sum target/release/sfg >> "$GITHUB_STEP_SUMMARY"

  # ── Publish gate (skipped in dry-run mode) ─────────────────────────────────
  publish-notice:
    name: Publish notice
    runs-on: ubuntu-latest
    needs: record-manifest-digest
    steps:
      - name: Print publish guidance
        run: |
          echo "### Release v${{ inputs.version }} — publish checklist" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "**DRY RUN** — no packages were published." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dry run is disabled.  Publish steps would run here." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Manual steps required (see docs/release-and-provenance.md):" >> "$GITHUB_STEP_SUMMARY"
          echo "- cargo publish (each workspace member in dependency order)" >> "$GITHUB_STEP_SUMMARY"
          echo "- maturin build + upload (Python wheel)" >> "$GITHUB_STEP_SUMMARY"
          echo "- napi build + npm publish (Node package)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Attach SBOM artefacts to the GitHub Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- Record sfg binary digest in release notes" >> "$GITHUB_STEP_SUMMARY"
