name: Temporary Rust Autoformat

on:
  push:
    branches:
      - cursor/schemaforge-hybrid-compiler-98d8

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: cursor/schemaforge-hybrid-compiler-98d8
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format Rust sources
        run: cargo fmt --all
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.rs'
          git commit -m "style: format object introspection changes"
          git push origin HEAD:cursor/schemaforge-hybrid-compiler-98d8
